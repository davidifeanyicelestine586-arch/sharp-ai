<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile - Sharp AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
  <!-- SIDEBAR PLACEHOLDER -->
  <div id="sidebar-container"></div>

  <main class="main-content">
    <!-- TOPBAR PLACEHOLDER -->
    <div id="topbar-container"></div>

    <div class="view-viewport">
      <section class="saas-view active-view">
        <div class="info-section">
          <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
            <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--primary-glow); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: var(--text-white);">DA</div>
            <div>
              <h2 style="margin: 0;">David Anderson</h2>
              <p style="color: var(--text-muted); margin: 5px 0 0 0;">david@example.com</p>
            </div>
          </div>
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-header">
                <span class="stat-label">Days active</span>
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>
              </div>
              <h3>12</h3>
            </div>
            <div class="stat-card">
              <div class="stat-header">
                <span class="stat-label">Assets created</span>
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></div>
              </div>
              <h3>156</h3>
            </div>
            <div class="stat-card">
              <div class="stat-header">
                <span class="stat-label">Words generated</span>
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div>
              </div>
              <h3>4.8k</h3>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- FOOTER PLACEHOLDER -->
    <div id="footer-container"></div>
  </main>
</div>

<script src="/LayoutManager.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    LayoutManager.init({
      activeNav: '/profile/'
    });
  });
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
