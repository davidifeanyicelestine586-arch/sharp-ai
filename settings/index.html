<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Sharp AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
  <!-- SIDEBAR PLACEHOLDER -->
  <div id="sidebar-container"></div>

  <main class="main-content">
    <!-- TOPBAR PLACEHOLDER -->
    <div id="topbar-container"></div>

    <div class="view-viewport">
      <section class="saas-view active-view">
        <div class="settings-card">
          <div class="settings-title-section">
            <h3>Configuration Panel</h3>
            <p>Manage API integrations and account credentials.</p>
          </div>
          <div class="field">
            <label for="apiKeyInput">OpenAI API Key</label>
            <div class="api-input-wrapper">
              <input type="password" id="apiKeyInput" placeholder="sk-proj-...">
              <button id="saveKeyBtn">Save Token</button>
            </div>
            <p class="field-hint">Your API token is processed exclusively on the client side.</p>
          </div>
          <div class="settings-data-table">
            <div class="data-row">
              <span class="row-label">Plan Tier</span>
              <span id="profileTierDisplay" class="row-value highlight-tier">Free Tier</span>
            </div>
            <div class="data-row">
              <span class="row-label">API Status</span>
              <span class="status-indicator active" id="apiStatusDisplay">Connected</span>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- FOOTER PLACEHOLDER -->
    <div id="footer-container"></div>
  </main>
</div>

<script src="/LayoutManager.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    LayoutManager.init({
      activeNav: '/settings/'
    });
  });
</script>
<script src="/config.js"></script>
<script src="/app.js"></script>
</body>
</html>
