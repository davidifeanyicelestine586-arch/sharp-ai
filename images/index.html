<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Images - Sharp AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
  <!-- SIDEBAR PLACEHOLDER -->
  <div id="sidebar-container"></div>
  <main class="main-content">
    <!-- TOPBAR PLACEHOLDER -->
    <div id="topbar-container"></div>
    <div class="view-viewport">
      <section class="saas-view active-view">
        <div class="dashboard-workspace">
          <aside class="editor-panel">
            <div class="panel-section-title">Creative Controls</div>
            <div class="field">
              <label>Visual Prompt</label>
              <textarea rows="4" placeholder="A futuristic city with neon lights, digital art style, high detail..."></textarea>
            </div>
            <div class="row">
              <div class="field">
                <label>Aspect Ratio</label>
                <div class="select-wrapper">
                  <select>
                    <option>1:1 Square</option>
                    <option>16:9 Landscape</option>
                    <option>9:16 Vertical</option>
                  </select>
                </div>
              </div>
              <div class="field">
                <label>Style</label>
                <div class="select-wrapper">
                  <select>
                    <option>Photorealistic</option>
                    <option>Digital Art</option>
                    <option>3D Render</option>
                    <option>Cyberpunk</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="field">
              <label>Seed (Optional)</label>
              <input type="text" placeholder="Randomize">
            </div>
            <button class="upgrade-btn" style="width: 100%; margin-top: 10px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              Generate Visuals
            </button>
          </aside>

          <div class="image-gallery">
            <div class="image-card">
              <div class="image-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span style="font-size: 13px; font-weight: 600;">Slot 01 Available</span>
              </div>
              <div class="image-overlay">
                <button class="copy-btn" style="width: 100%; justify-content: center;">Download Asset</button>
              </div>
            </div>
            <div class="image-card">
              <div class="image-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span style="font-size: 13px; font-weight: 600;">Slot 02 Available</span>
              </div>
              <div class="image-overlay">
                <button class="copy-btn" style="width: 100%; justify-content: center;">Download Asset</button>
              </div>
            </div>
            <div class="image-card">
              <div class="image-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span style="font-size: 13px; font-weight: 600;">Slot 03 Available</span>
              </div>
              <div class="image-overlay">
                <button class="copy-btn" style="width: 100%; justify-content: center;">Download Asset</button>
              </div>
            </div>
            <div class="image-card">
              <div class="image-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span style="font-size: 13px; font-weight: 600;">Slot 04 Available</span>
              </div>
              <div class="image-overlay">
                <button class="copy-btn" style="width: 100%; justify-content: center;">Download Asset</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
    <!-- FOOTER PLACEHOLDER -->
    <div id="footer-container"></div>
  </main>
</div>
<script src="/LayoutManager.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    LayoutManager.init({
      activeNav: '/images/'
    });
  });
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
