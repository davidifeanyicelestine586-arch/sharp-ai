<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing - Sharp AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
  <!-- SIDEBAR PLACEHOLDER -->
  <div id="sidebar-container"></div>
  <main class="main-content">
    <!-- TOPBAR PLACEHOLDER -->
    <div id="topbar-container"></div>
    <div class="view-viewport">
      <section class="saas-view active-view">
        <div class="pricing-grid">
          <div class="info-section pricing-card">
            <h2 style="margin-top: 0;">Free</h2>
            <p class="price-value">$0<span>/month</span></p>
            <ul class="pricing-features">
              <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                3 Generations / day
              </li>
              <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Standard Templates
              </li>
              <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Community Support
              </li>
            </ul>
            <button class="regenerateBtn" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-premium); background: transparent; color: var(--text-white); cursor: pointer;">Current Plan</button>
          </div>

          <div class="info-section pricing-card featured">
            <h2 style="margin-top: 0;">Pro</h2>
            <p class="price-value">$29<span>/month</span></p>
            <ul class="pricing-features">
              <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Unlimited Generations
              </li>
              <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Advanced Blueprints
              </li>
              <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Priority AI Processing
              </li>
              <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                API Access
              </li>
            </ul>
            <button class="upgrade-btn" style="width: 100%;">Upgrade to Pro</button>
          </div>
        </div>
      </section>
    </div>
    <!-- FOOTER PLACEHOLDER -->
    <div id="footer-container"></div>
  </main>
</div>
<script src="/LayoutManager.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    LayoutManager.init({
      activeNav: '/pricing/'
    });
  });
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
